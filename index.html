<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="EY6Zad842ktm-smtiVoeq7Ya9vjKGKC9s6WAmS5smPY" />
    <title>MAKAR7 HD Passport Photo Maker</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #07111f, #162447, #2563eb);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1100px;
        }

        .card {
            background: rgba(255, 255, 255, .08);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,.35);
        }

        .header {
            text-align: center;
            color: #fff;
            margin-bottom: 25px;
        }

        .header i {
            font-size: 60px;
            color: #60a5fa;
        }

        .header h1 {
            font-size: 42px;
            margin-top: 10px;
        }

        .header p {
            opacity: .8;
        }

        .upload-box {
            margin-top: 20px;
        }

        .upload-box label {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 180px;
            border: 2px dashed rgba(255,255,255,.5);
            border-radius: 18px;
            color: #fff;
            cursor: pointer;
            transition: .3s;
        }

        .upload-box label:hover {
            background: rgba(255, 255, 255, .08);
        }

        .upload-box i {
            font-size: 55px;
            margin-bottom: 10px;
        }

        #cropSection {
            margin-top: 25px;
        }

        #cropSection h2 {
            color: #fff;
            text-align: center;
            margin-bottom: 15px;
        }

        #cropImage {
            width: 100%;
            max-height: 500px;
            background: #fff;
            border-radius: 15px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .buttons button {
            padding: 15px;
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: .3s;
        }

        .buttons button:hover {
            transform: translateY(-3px);
        }

        .buttons button:disabled {
            opacity: .5;
            cursor: not-allowed;
            transform: none;
        }

        #generateBtn { background: #2563eb; }
        #printBtn { background: #f59e0b; }
        #downloadBtn { background: #ef4444; }

        #zoomInBtn, #zoomOutBtn, #rotateLeftBtn, #rotateRightBtn, #cropApplyBtn {
            background: #16a34a;
        }

        .preview {
            background: #fff;
            padding: 20px;
            border-radius: 20px;
            margin-top: 20px;
        }

        .preview h2 {
            text-align: center;
            margin-bottom: 15px;
        }

        canvas {
            width: 100%;
            display: block;
            border: 2px solid #ddd;
            border-radius: 12px;
            background: #fff;
        }

        .passport-settings {
            margin-top: 25px;
            background: rgba(255, 255, 255, .08);
            padding: 20px;
            border-radius: 15px;
        }

        .passport-settings h3 {
            color: #fff;
            margin-bottom: 15px;
        }

        .passport-settings label {
            display: block;
            color: #fff;
            margin-top: 15px;
            margin-bottom: 8px;
        }

        .passport-settings select {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
        }

        #status {
            text-align: center;
            color: #fff;
            margin-top: 20px;
            font-size: 16px;
            font-weight: 600;
        }

        @media(max-width: 768px) {
            .card { padding: 18px; }
            .header h1 { font-size: 30px; }
            .buttons { grid-template-columns: 1fr; }
            .preview { padding: 12px; }
            canvas { width: 100%; height: auto; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">

            <div class="header">
                <i class="fa-solid fa-camera"></i>
                <h1>MAKAR7</h1>
                <p>Professional HD Passport Photo Maker</p>
            </div>

            <div class="upload-box">
                <label for="upload">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                    <h2>Upload Photo</h2>
                    <p>Select JPG / PNG</p>
                </label>
                <input type="file" id="upload" accept="image/*" hidden>
            </div>

            <div id="cropSection" style="display:none;">
                <h2>Crop Photo</h2>
                <img id="cropImage">
                <div class="buttons">
                    <button id="zoomInBtn" type="button"><i class="fa-solid fa-magnifying-glass-plus"></i> Zoom +</button>
                    <button id="zoomOutBtn" type="button"><i class="fa-solid fa-magnifying-glass-minus"></i> Zoom -</button>
                    <button id="rotateLeftBtn" type="button"><i class="fa-solid fa-rotate-left"></i> Rotate Left</button>
                    <button id="rotateRightBtn" type="button"><i class="fa-solid fa-rotate-right"></i> Rotate Right</button>
                    <button id="cropApplyBtn" type="button"><i class="fa-solid fa-crop"></i> Apply Crop</button>
                </div>
            </div>

            <div class="buttons">
                <button id="generateBtn" type="button" disabled><i class="fa-solid fa-images"></i> Generate 8 Photos</button>
                <button id="printBtn" type="button" disabled><i class="fa-solid fa-print"></i> Print</button>
                <button id="downloadBtn" type="button" disabled><i class="fa-solid fa-file-pdf"></i> Download PDF</button>
            </div>

            <div class="preview">
                <h2>Passport Photo Preview</h2>
                <canvas id="canvas" width="1800" height="1200"></canvas>
            </div>

            <div class="passport-settings">
                <h3>Passport Settings</h3>

                <label for="quality">Photo Quality</label>
                <select id="quality">
                    <option value="300">HD 300 DPI</option>
                    <option value="600">Ultra HD 600 DPI</option>
                </select>

                <label for="borderSelect">Border</label>
                <select id="borderSelect">
                    <option value="yes">Enable Border</option>
                    <option value="no">Disable Border</option>
                </select>

                <label for="bgSelect">Background</label>
                <select id="bgSelect">
                    <option value="original">Original Background</option>
                    <option value="white">White Background (AI)</option>
                    <option value="blue">Blue Background (AI)</option>
                </select>
            </div>

            <p id="status">Ready</p>

        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>

    <script>
        const upload = document.getElementById("upload");
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        const cropSection = document.getElementById("cropSection");
        const cropImage = document.getElementById("cropImage");

        const zoomInBtn = document.getElementById("zoomInBtn");
        const zoomOutBtn = document.getElementById("zoomOutBtn");
        const rotateLeftBtn = document.getElementById("rotateLeftBtn");
        const rotateRightBtn = document.getElementById("rotateRightBtn");
        const cropApplyBtn = document.getElementById("cropApplyBtn");

        const generateBtn = document.getElementById("generateBtn");
        const printBtn = document.getElementById("printBtn");
        const downloadBtn = document.getElementById("downloadBtn");

        const quality = document.getElementById("quality");
        const borderSelect = document.getElementById("borderSelect");
        const bgSelect = document.getElementById("bgSelect");
        const status = document.getElementById("status");

        let cropper;
        let img = new Image();
        let originalImage = "";
        let hasCroppedImage = false;
        let hasGenerated = false;

        // Upload & Initialize Cropper
        upload.addEventListener("change", function(e){
            const file = e.target.files[0];
            if(!file) return;

            const reader = new FileReader();
            reader.onload = function(event){
                cropSection.style.display = "block";
                cropImage.src = event.target.result;

                cropImage.onload = function(){
                    if(cropper){
                        cropper.destroy();
                    }
                    cropper = new Cropper(cropImage, {
                        aspectRatio: 35/45,
                        viewMode: 1,
                        autoCropArea: 1,
                        movable: true,
                        zoomable: true,
                        rotatable: true,
                        scalable: true,
                        responsive: true
                    });
                };
            };
            reader.readAsDataURL(file);
        });

        // Cropper Controls
        zoomInBtn.onclick = () => cropper && cropper.zoom(0.1);
        zoomOutBtn.onclick = () => cropper && cropper.zoom(-0.1);
        rotateLeftBtn.onclick = () => cropper && cropper.rotate(-90);
        rotateRightBtn.onclick = () => cropper && cropper.rotate(90);

        cropApplyBtn.onclick = async function(){
            if(!cropper) return;

            const croppedCanvas = cropper.getCroppedCanvas({
                width: 700,
                height: 900,
                imageSmoothingQuality: "high"
            });

            originalImage = croppedCanvas.toDataURL("image/png");
            hasCroppedImage = true;
            await processBackground();
            cropSection.style.display = "none";
        };

        bgSelect.onchange = function(){
            if(originalImage){
                processBackground();
            }
        };

        // Background Processing
        async function processBackground(){
            if(bgSelect.value === "original"){
                updatePreview(originalImage);
                return;
            }

            status.innerText = "Removing Background...";

            try {
                const response = await fetch("/remove-bg", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        image: originalImage,
                        color: bgSelect.value
                    })
                });

                if(!response.ok){
                    throw new Error("Server returned status " + response.status);
                }

                const data = await response.json();

                if(data.success){
                    updatePreview(data.image);
                    status.innerText = "Background Removed Successfully";
                } else {
                    updatePreview(originalImage);
                    status.innerText = data.message || "Background removal failed (using original)";
                }
            } catch(err) {
                console.log(err);
                updatePreview(originalImage);
                status.innerText = "Backend Connection Failed (Using Original)";
            }
        }

        function updatePreview(src){
            img.onload = function(){
                canvas.width = 1800;
                canvas.height = 1200;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#ffffff";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 100, 100, 700, 900);
                generateBtn.disabled = false;
            }
            img.src = src;
        }

        // Generate 8 Photos
        generateBtn.onclick = function () {
            if (!img.src || !hasCroppedImage) {
                alert("Please upload and crop a photo first.");
                return;
            }

            const dpi = parseInt(quality.value);
            const photoW = (35 / 25.4) * dpi;
            const photoH = (45 / 25.4) * dpi;

            const cols = 4;
            const rows = 2;
            const gap = 40;

            canvas.width = 1800;
            canvas.height = 1200;

            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const totalWidth = cols * photoW + (cols - 1) * gap;
            const startX = (canvas.width - totalWidth) / 2;
            const startY = 70;

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const x = startX + c * (photoW + gap);
                    const y = startY + r * (photoH + gap);

                    ctx.drawImage(img, x, y, photoW, photoH);

                    if (borderSelect.value === "yes") {
                        ctx.strokeStyle = "#666";
                        ctx.lineWidth = 3;
                        ctx.strokeRect(x, y, photoW, photoH);
                    }
                }
            }
            hasGenerated = true;
            printBtn.disabled = false;
            downloadBtn.disabled = false;
            status.innerText = "8 Passport Photos Generated Successfully.";
        };

        // Print Functionality
        printBtn.onclick = function () {
            if (!hasGenerated) {
                alert("Generate photos first.");
                return;
            }

            const image = canvas.toDataURL("image/jpeg", 1);
            const win = window.open("");

            win.document.write(`
                <html>
                <body style="margin:0">
                    <img src="${image}" style="width:100%">
                </body>
                </html>
            `);
            win.document.close();

            win.onload = function () {
                win.print();
                win.close();
            };
        };

        // Download PDF Functionality
        downloadBtn.onclick = function () {
            if (!hasGenerated) {
                alert("Generate photos first.");
                return;
            }

            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF({
                orientation: "landscape",
                unit: "mm",
                format: [102, 152] // 4x6 Inches Sheet
            });

            const image = canvas.toDataURL("image/jpeg", 1);
            pdf.addImage(image, "JPEG", 0, 0, 152, 102);
            pdf.save("MAKAR7-HD-Passport-Photo.pdf");
        };
    </script>
</body>
</html>
