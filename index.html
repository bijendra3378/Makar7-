<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAKAR7 HD Passport Photo Maker</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #07111f, #162447, #2563eb);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1100px;
        }

        .card {
            background: rgba(255, 255, 255, .08);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, .35);
        }

        .header {
            text-align: center;
            color: #fff;
            margin-bottom: 25px;
        }

        .header i {
            font-size: 60px;
            color: #60a5fa;
        }

        .header h1 {
            font-size: 42px;
            margin-top: 10px;
        }

        .header p {
            opacity: .8;
        }

        .upload-box label {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 180px;
            border: 2px dashed rgba(255, 255, 255, .5);
            border-radius: 18px;
            color: #fff;
            cursor: pointer;
            transition: .3s;
        }

        .upload-box label:hover {
            background: rgba(255, 255, 255, .08);
        }

        .upload-box i {
            font-size: 55px;
            margin-bottom: 10px;
        }

        #cropSection {
            margin-top: 25px;
        }

        #cropSection h2 {
            color: #fff;
            margin-bottom: 15px;
            text-align: center;
        }

        #cropImage {
            max-width: 100%;
            display: block;
            border-radius: 15px;
            background: #fff;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .buttons button {
            padding: 15px;
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: .3s;
        }

        .buttons button:hover {
            transform: translateY(-3px);
        }

        #generateBtn {
            background: #2563eb;
        }

        #printBtn {
            background: #f59e0b;
        }

        #downloadBtn {
            background: #ef4444;
        }

        #zoomInBtn,
        #zoomOutBtn,
        #rotateLeftBtn,
        #rotateRightBtn,
        #cropApplyBtn {
            background: #16a34a;
        }

        .preview {
            background: #fff;
            padding: 20px;
            border-radius: 20px;
        }

        .preview h2 {
            text-align: center;
            margin-bottom: 15px;
        }

        canvas {
            width: 100%;
            display: block;
            border: 2px solid #ddd;
            border-radius: 12px;
            background: #fff;
        }

        .passport-settings {
            margin-top: 25px;
            background: rgba(255, 255, 255, .08);
            padding: 20px;
            border-radius: 15px;
        }

        .passport-settings h3 {
            color: #fff;
            margin-bottom: 15px;
        }

        .passport-settings label {
            display: block;
            color: #fff;
            margin-top: 15px;
            margin-bottom: 8px;
        }

        .passport-settings select {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 10px;
        }

        #status {
            text-align: center;
            color: #fff;
            margin-top: 20px;
        }

        @media(max-width:768px) {
            .card {
                padding: 18px;
            }

            .header h1 {
                font-size: 30px;
            }

            .buttons {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <div class="header">
                <i class="fa-solid fa-camera"></i>
                <h1>MAKAR7</h1>
                <p>Professional HD Passport Photo Maker</p>
            </div>

            <div class="upload-box">
                <label for="upload">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                    <h2>Upload Photo</h2>
                    <p>Select JPG / PNG</p>
                </label>
                <input type="file" id="upload" accept="image/*" hidden>
            </div>

            <div id="cropSection" style="display:none;">
                <h2>Crop Photo</h2>
                <img id="cropImage">
                <div class="buttons">
                    <button id="zoomInBtn"><i class="fa-solid fa-magnifying-glass-plus"></i> Zoom +</button>
                    <button id="zoomOutBtn"><i class="fa-solid fa-magnifying-glass-minus"></i> Zoom -</button>
                    <button id="rotateLeftBtn"><i class="fa-solid fa-rotate-left"></i> Left</button>
                    <button id="rotateRightBtn"><i class="fa-solid fa-rotate-right"></i> Right</button>
                    <button id="cropApplyBtn"><i class="fa-solid fa-crop"></i> Apply Crop</button>
                </div>
            </div>

            <div class="buttons">
                <button id="generateBtn">Generate 8 Photos</button>
                <button id="printBtn">Print</button>
                <button id="downloadBtn">Download PDF</button>
            </div>

            <div class="preview">
                <h2>Preview</h2>
                <canvas id="canvas" width="1800" height="1200"></canvas>
            </div>

            <div class="passport-settings">
                <h3>Settings</h3>
                <label>Photo Quality</label>
                <select id="quality">
                    <option value="300">HD 300 DPI</option>
                    <option value="600">Ultra HD 600 DPI</option>
                </select>

                <label>Border</label>
                <select id="borderSelect">
                    <option value="yes">Enable</option>
                    <option value="no">Disable</option>
                </select>

                <label>Background Color</label>
                <select id="bgSelect">
                    <option value="original">Original Background</option>
                    <option value="white">White Background (AI)</option>
                    <option value="blue">Blue Background (AI)</option>
                </select>
            </div>

            <p id="status">Ready</p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>

    <script>
        const upload = document.getElementById("upload");
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        const cropSection = document.getElementById("cropSection");
        const cropImage = document.getElementById("cropImage");

        const zoomInBtn = document.getElementById("zoomInBtn");
        const zoomOutBtn = document.getElementById("zoomOutBtn");
        const rotateLeftBtn = document.getElementById("rotateLeftBtn");
        const rotateRightBtn = document.getElementById("rotateRightBtn");
        const cropApplyBtn = document.getElementById("cropApplyBtn");

        const generateBtn = document.getElementById("generateBtn");
        const quality = document.getElementById("quality");
        const borderSelect = document.getElementById("borderSelect");
        const bgSelect = document.getElementById("bgSelect");
        const status = document.getElementById("status");

        const printBtn = document.getElementById("printBtn");
        const downloadBtn = document.getElementById("downloadBtn");

        let cropper;
        let img = new Image();
        let originalCroppedBase64 = ""; 

        upload.addEventListener("change", function (e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (event) {
                cropSection.style.display = "block";
                cropImage.src = event.target.result;

                cropImage.onload = function () {
                    if (cropper) {
                        cropper.destroy();
                    }
                    cropper = new Cropper(cropImage, {
                        aspectRatio: 35 / 45,
                        viewMode: 1,
                        autoCropArea: 1,
                        movable: true,
                        zoomable: true,
                        rotatable: true,
                        scalable: true,
                        responsive: true
                    });
                };
            };
            reader.readAsDataURL(file);
        });

        zoomInBtn.onclick = () => cropper && cropper.zoom(0.1);
        zoomOutBtn.onclick = () => cropper && cropper.zoom(-0.1);
        rotateLeftBtn.onclick = () => cropper && cropper.rotate(-90);
        rotateRightBtn.onclick = () => cropper && cropper.rotate(90);

        cropApplyBtn.onclick = function () {
            if (!cropper) return;

            const croppedCanvas = cropper.getCroppedCanvas({
                width: 700,
                height: 900,
                imageSmoothingQuality: "high"
            });

            originalCroppedBase64 = croppedCanvas.toDataURL("image/png");
            processBackground();
            cropSection.style.display = "none";
        };

        bgSelect.onchange = function() {
            if(originalCroppedBase64) {
                processBackground();
            }
        };

        async function processBackground() {
            const targetBg = bgSelect.value;

            if (targetBg === "original") {
                updateImageSource(originalCroppedBase64);
                status.innerText = "Photo cropped successfully.";
                return;
            }

            status.innerText = "Processing AI Background Removal (It may take 1 min if backend is waking up)...";

            try {
                // ⚠️ DHYAN DEN: Niche apna sahi Render App domain URL paste karein!
                const endpoint = "https://makar7.onrender.com/remove-bg";

                const response = await fetch(endpoint, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        image: originalCroppedBase64,
                        color: targetBg
                    })
                });

                if (!response.ok) throw new Error("Backend error processing image.");

                const data = await response.json();
                if (data.success) {
                    updateImageSource(data.image);
                    status.innerText = `Background color changed to ${targetBg} successfully!`;
                } else {
                    alert("Error: " + data.message);
                    updateImageSource(originalCroppedBase64);
                }
            } catch (error) {
                console.error(error);
                alert("Failed to communicate with Python Backend. Rendering original crop.");
                updateImageSource(originalCroppedBase64);
            }
        }

        function updateImageSource(src) {
            img.onload = function () {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#ffffff";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 100, 100, 700, 900);
            };
            img.src = src;
        }

        generateBtn.onclick = function () {
            if (!img.src) {
                alert("Please upload and crop a photo first.");
                return;
            }

            const dpi = parseInt(quality.value);
            const photoW = (35 / 25.4) * dpi;
            const photoH = (45 / 25.4) * dpi;

            const cols = 4;
            const rows = 2;
            const gap = 40;

            canvas.width = 1800;
            canvas.height = 1200;

            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const totalWidth = cols * photoW + (cols - 1) * gap;
            const startX = (canvas.width - totalWidth) / 2;
            const startY = 70; 

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    let x = startX + c * (photoW + gap);
                    let y = startY + r * (photoH + gap);

                    ctx.drawImage(img, x, y, photoW, photoH);

                    if (borderSelect.value === "yes") {
                        ctx.strokeStyle = "#666";
                        ctx.lineWidth = 3;
                        ctx.strokeRect(x, y, photoW, photoH);
                    }
                }
            }
            status.innerText = "8 Passport Photos Generated Successfully.";
        };

        printBtn.onclick = function () {
            if (!img.src) { alert("Generate photos first."); return; }
            const image = canvas.toDataURL("image/jpeg", 1);
            const win = window.open("");
            win.document.write(`<html><body style="margin:0;"><img src="${image}" style="width:100%;"></body></html>`);
            win.document.close();
            win.onload = function(){ win.print(); win.close(); }
        };

        downloadBtn.onclick = function () {
            if (!img.src) { alert("Generate photos first."); return; }
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF({ orientation: "landscape", unit: "mm", format: [102, 152] });
            const image = canvas.toDataURL("image/jpeg", 1);
            pdf.addImage(image, "JPEG", 0, 0, 152, 102);
            pdf.save("MAKAR7-HD-Passport-Photo.pdf");
        };
    </script>
</body>
</html>
